version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: ghoast-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ghoast
      POSTGRES_PASSWORD: ghoast_dev
      POSTGRES_DB: ghoast
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ghoast -d ghoast']
      interval: 5s
      timeout: 5s
      retries: 5

  postgres_test:
    image: postgres:16-alpine
    container_name: ghoast-postgres-test
    restart: unless-stopped
    environment:
      POSTGRES_USER: ghoast
      POSTGRES_PASSWORD: ghoast_dev
      POSTGRES_DB: ghoast_test
    ports:
      - '5433:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ghoast -d ghoast_test']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ghoast-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  postgres_data:
